<!doctype html>
<html lang="en-us">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YMKR6TMF13"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-YMKR6TMF13');

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, minimum-scale=1, maximum-scale=1">
  <title>Balatro</title>

  <!-- Load custom style sheet -->
  <link rel="stylesheet" type="text/css" href="theme/love.css">

  <script src="consolewrapper.js"></script>
</head>

<body>
  <center>
    <div>
      <canvas id="loadingCanvas" oncontextmenu="event.preventDefault()" width="800" height="600"></canvas>
      <canvas id="canvas" oncontextmenu="event.preventDefault()" width="100%" height="100%"></canvas>
    </div>
  </center>

  <script type='text/javascript'>
    window.callad = () => {
      window.parent.postMessage({
        type: 'adcall'
      }, '*');
    }
    var canvas = document.getElementById("loadingCanvas");
    canvas.width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
    canvas.height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;

    function goFullScreen() {
      var canvas = document.getElementById("canvas");
      if (canvas.requestFullScreen)
        canvas.requestFullScreen();
      else if (canvas.webkitRequestFullScreen)
        canvas.webkitRequestFullScreen();
      else if (canvas.mozRequestFullScreen)
        canvas.mozRequestFullScreen();
    }

    function FullScreenHook() {
      var canvas = document.getElementById("canvas");
      canvas.width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
      canvas.height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
    }
    var loadingContext = document.getElementById('loadingCanvas').getContext('2d');

    function drawLoadingText(text) {
      var canvas = loadingContext.canvas;

      loadingContext.fillStyle = "rgb(142, 195, 227)";
      loadingContext.fillRect(0, 0, canvas.scrollWidth, canvas.scrollHeight);

      loadingContext.font = '2em arial';
      loadingContext.textAlign = 'center'
      loadingContext.fillStyle = "rgb( 11, 86, 117 )";
      loadingContext.fillText(text, canvas.scrollWidth / 2, canvas.scrollHeight / 2);
    }

    window.onload = function() {
      window.focus();
    };
    window.onclick = function() {
      window.focus();
    };

    window.addEventListener("keydown", function(e) {
      // space and arrow keys
      if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) {
        e.preventDefault();
      }
    }, false);

    window.__getWebDB = function(name) {
      return {
        get: function(key) {
          var val = localStorage.getItem(name + "_" + key);
          console.log("WebDB GET: " + key + " = " + (val ? "found" : "null"));
          return val;
        },
        set: function(key, val) {
          console.log("WebDB SET: " + key);
          localStorage.setItem(name + "_" + key, val);
        },
        delete: function(key) {
          console.log("WebDB DELETE: " + key);
          localStorage.removeItem(name + "_" + key);
        }
      };
    };

    var Module = {
      arguments: ["game.love"],
      INITIAL_MEMORY: 256000000,
      printErr: console.error.bind(console),
      locateFile: function(path, prefix) {
        if (path.endsWith(".data")) return "game.love";
        if (path.endsWith(".wasm")) return "game.wasm";
        return path;
      },
      postRun: [function() {
        // love.js already mounts IDBFS at /home/web_user/love and syncs on page unload.
        // We add periodic syncing every 5s so saves aren't lost if the tab is closed
        // abruptly (the beforeunload sync in love.js is async and may not finish in time).
        setInterval(function() {
          try {
            FS.syncfs(false, function(err) {
              if (err) console.error("Periodic save sync error:", err);
            });
          } catch(e) {}
        }, 5000);
        console.log("Save system ready – syncing every 5s");
      }],
      canvas: (function() {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener("webglcontextlost", function(e) {
          alert('WebGL context lost. You will need to reload the page.');
          e.preventDefault();
        }, false);
        return canvas;
      })(),
      setStatus: function(text) {
        if (text) {
          drawLoadingText(text);
        } else if (Module.remainingDependencies === 0) {
          document.getElementById('loadingCanvas').style.display = 'none';
          document.getElementById('canvas').style.visibility = 'visible';
        }
      },
      totalDependencies: 0,
      remainingDependencies: 0,
      monitorRunDependencies: function(left) {
        this.remainingDependencies = left;
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
      }
    };
    Module.setStatus('Downloading...');
    window.onerror = function(event) {
      Module.setStatus('Exception thrown, see JavaScript console');
      Module.setStatus = function(text) {
        if (text) Module.printErr('[post-exception status] ' + text);
      };
    };

    function scanFS(path, depth) {
      if (depth > 4) return;
      try {
        var items = FS.readdir(path);
        items.forEach(function(item) {
          if (item === '.' || item === '..') return;
          var full = path + '/' + item;
          try {
            var stat = FS.stat(full);
            if (FS.isDir(stat.mode)) {
              console.log('[FS DIR] ' + full);
              scanFS(full, depth + 1);
            } else {
              console.log('[FS FILE] ' + full + ' (' + stat.size + ' bytes)');
            }
          } catch(e) {}
        });
      } catch(e) {}
    }

    var applicationLoad = function(e) {
      Love(Module);

      // love.js has a bug: if the initial IDBFS sync returns an error, it never
      // calls removeRunDependency("IDBFS_sync"), leaving the game stuck on
      // "All downloads complete." This timeout is a safety net.
      setTimeout(function() {
        try {
          if (Module.remainingDependencies > 0) {
            console.warn("IDBFS_sync safety timeout – unblocking game");
            Module.removeRunDependency("IDBFS_sync");
          }
        } catch(e) {}
      }, 6000);

      // After 15 seconds, scan the filesystem to see where saves are written
      setTimeout(function() {
        try {
          console.log('[FS SCAN] Scanning filesystem...');
          scanFS('/home/web_user/love', 0);
          console.log('[FS SCAN] Done');
        } catch(e) { console.log('[FS SCAN ERROR] ' + e); }
      }, 15000);

      // Periodic IDBFS sync every 5 seconds (since postRun never fires in love.js)
      setTimeout(function() {
        setInterval(function() {
          try {
            FS.syncfs(false, function(err) {
              if (err) console.error("Periodic save sync error:", err);
            });
          } catch(e) {}
        }, 5000);
        console.log('Periodic save sync started');
      }, 8000);
    }
  </script >
  <script type="text/javascript" src="game.js"></script>
  <script async type="text/javascript" src="love.js" onload="applicationLoad(this)"></script>
</body>

</html>
